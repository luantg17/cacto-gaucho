<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌵 Cacto Gaúcho</title>
    <style>
        /* ============================================================
           RESET E BASE - MOBILE FIRST
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f172a 0%, #1a2335 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            color: #e2e8f0;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px 16px 16px 16px;
            border: 1px solid rgba(51, 65, 85, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            text-align: center;
            margin-bottom: 6px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header .tagline {
            color: #94a3b8;
            font-style: italic;
            font-size: 0.8rem;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .header .tagline span {
            color: #4ade80;
            font-weight: 600;
        }

        /* ============================================================
           Cacto ÁREA - GRANDE
           ============================================================ */
        .cacto-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px 0 6px 0;
            position: relative;
        }

        .cacto-wrapper {
            position: relative;
            display: inline-block;
        }

        .cacto-img {
            width: 220px;
            height: 260px;
            object-fit: contain;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 10px 30px rgba(34, 197, 94, 0.15));
            border-radius: 16px;
        }

        /* ============================================================
           ESTADO DO CLIMA
           ============================================================ */
        .estado-clima {
            text-align: center;
            margin: 4px 0 10px 0;
        }

        .estado-clima .badge {
            display: inline-block;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4ade80;
            letter-spacing: 0.3px;
            backdrop-filter: blur(5px);
        }

        /* ============================================================
           FRASE DO DIA
           ============================================================ */
        .frase-do-dia {
            text-align: center;
            margin: 10px 0 14px 0;
            padding: 10px 14px;
            background: rgba(34, 197, 94, 0.05);
            border-radius: 14px;
            border-left: 3px solid #22c55e;
        }

        .frase-do-dia p {
            color: #cbd5e1;
            font-size: 0.85rem;
            font-style: italic;
            line-height: 1.4;
        }

        .frase-do-dia p .destaque {
            color: #4ade80;
            font-weight: 600;
            font-style: normal;
        }

        /* ============================================================
           CARDS - 2 COLUNAS NO CELULAR
           ============================================================ */
        .info-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(5px);
            padding: 14px 8px 12px 8px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(51, 65, 85, 0.15);
            transition: all 0.2s ease;
        }

        .card:active {
            transform: scale(0.96);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .card .icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 2px;
        }

        .card .label {
            font-size: 0.55rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            display: block;
        }

        .card .value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2px;
            display: block;
            line-height: 1.2;
        }

        .card .value.temperatura { color: #f87171; }
        .card .value.umidade { color: #60a5fa; }
        .card .value.uv { color: #fbbf24; }
        .card .value.chuva { color: #818cf8; }
        .card .value.bateria { color: #4ade80; }

        .card .unit {
            font-size: 0.6rem;
            color: #64748b;
            display: block;
            margin-top: -2px;
        }

        /* Card de bateria ocupa 2 colunas */
        .card-bateria {
            grid-column: span 2;
        }

        /* ============================================================
           STATUS ESP32
           ============================================================ */
        .status-ip {
            margin-top: 14px;
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(51, 65, 85, 0.15);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px 12px;
        }

        .status-ip .ip {
            font-weight: bold;
            color: #94a3b8;
        }

        .status-ip .conectado {
            color: #4ade80;
        }

        .status-ip .desconectado {
            color: #f87171;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            color: #475569;
            font-size: 0.6rem;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 1px solid rgba(51, 65, 85, 0.15);
            letter-spacing: 0.3px;
        }

        /* ============================================================
           RESPONSIVO - AJUSTES FINOS
           ============================================================ */
        @media (max-width: 400px) {
            .container { padding: 14px 12px; }
            .header h1 { font-size: 1.5rem; }
            .cacto-img { width: 170px; height: 210px; }
            .card .value { font-size: 1.2rem; }
            .card .icon { font-size: 1.5rem; }
            .card { padding: 10px 6px; }
        }

        @media (min-width: 600px) {
            .cacto-img { width: 280px; height: 320px; }
            .container { padding: 30px 25px; }
            .info-cards { grid-template-columns: repeat(3, 1fr); }
            .card-bateria { grid-column: span 1; }
        }

        @media (min-width: 900px) {
            .container { max-width: 700px; }
            .info-cards { grid-template-columns: repeat(5, 1fr); }
        }

        /* ============================================================
           ANIMAÇÃO DE CARREGAMENTO
           ============================================================ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1>🌵 Cacto Gaúcho</h1>
            <p class="tagline">"O <span>clima</span> muda. Ele <span>sente</span>."</p>
        </div>

        <!-- ===== Cacto ===== -->
        <div class="cacto-area">
            <div class="cacto-wrapper">
                <img id="cacto-character" class="cacto-img" src="imagens/cacto-ensolarado.png" alt="Cacto Gaúcho" loading="lazy">
            </div>
        </div>

        <!-- ===== Estado do Clima ===== -->
        <div class="estado-clima">
            <span class="badge" id="estadoBadge">☀️ Ensolarado</span>
        </div>

        <!-- ===== Frase do Dia ===== -->
        <div class="frase-do-dia">
            <p id="fraseDoDia">🌵 <span class="destaque">Cacto diz:</span> "Tudo tranquilo, meu chapa! Dia lindo!"</p>
        </div>

        <!-- ===== Cards ===== -->
        <div class="info-cards">
            <div class="card">
                <span class="icon">🌡️</span>
                <span class="label">Temperatura</span>
                <span id="temp-value" class="value temperatura">--</span>
                <span class="unit">°C</span>
            </div>
            <div class="card">
                <span class="icon">💧</span>
                <span class="label">Umidade</span>
                <span id="umid-value" class="value umidade">--</span>
                <span class="unit">%</span>
            </div>
            <div class="card">
                <span class="icon">☀️</span>
                <span class="label">UV</span>
                <span id="uv-value" class="value uv">--</span>
                <span class="unit">idx</span>
            </div>
            <div class="card">
                <span class="icon">🌧️</span>
                <span class="label">Chuva</span>
                <span id="rain-value" class="value chuva">--</span>
                <span class="unit">mm</span>
            </div>
            <div class="card card-bateria">
                <span class="icon">🔋</span>
                <span class="label">Bateria</span>
                <span id="battery-value" class="value bateria">--</span>
                <span class="unit">%</span>
            </div>
        </div>

        <!-- ===== Status ESP32 ===== -->
        <div class="status-ip">
            <span>📡 <span id="status-conexao" class="desconectado">⛔ Desconectado</span></span>
            <span>IP: <span class="ip" id="ip-esp">Nenhum</span></span>
        </div>

        <!-- ===== Footer ===== -->
        <div class="footer">
            🌵 Feito com 🧉 • Dados em tempo real
        </div>
    </div>

    <script>
        // ============================================================
        // ===== CONFIGURAÇÃO - IP DO ESP32 ===========================
        // ============================================================
        var ipESP32 = '192.168.0.200'; // ← COLOQUE O IP FIXO DO SEU ESP32

        // ============================================================
        // ===== MAPEAMENTO DAS IMAGENS ===============================
        // ============================================================
        var imagens = {
            ensolarado: 'imagens/cacto-ensolarado.png',
            nublado: 'imagens/cacto-nublado.png',
            chuvoso: 'imagens/cacto-chuvoso.png',
            ventoso: 'imagens/cacto-ventoso.png',
            frio: 'imagens/cacto-frio.png',
            quente: 'imagens/cacto-quente.png'
        };

        // ============================================================
        // ===== FRASES DO CACTE ======================================
        // ============================================================
        var frases = {
            ensolarado: [
                '☀️ "Dia lindo! Perfeito pra esticar os espinhos."',
                '🌵 "Solzão! Bora tomar um chimarrão na sombra."',
                '😎 "Tô de óculos escuros, mas não sou de pagar!"'
            ],
            nublado: [
                '☁️ "Fica pensativo, mas segue firme."',
                '🌵 "Clima calmo, como eu gosto."',
                '🤔 "Tá nublado... será que vai chover?"'
            ],
            chuvoso: [
                '🌧️ "Peguei meu guarda-chuva! Não me molha, tchê!"',
                '☂️ "Chuva boa pra dormir."',
                '💧 "Não me molha, pelo amor!"'
            ],
            ventoso: [
                '🌬️ "Segura o chapéu que o vento tá brabo!"',
                '💨 "Tá voando tudo!"',
                '🍃 "Ventania boa pros gaúchos!"'
            ],
            frio: [
                '🥶 "Bora esquentar com um chimarrão!"',
                '🧉 "Meu chimarrão tá mais quente que o clima!"',
                '❄️ "Tá frio demais, vou botar meu casaquinho."'
            ],
            quente: [
                '🥵 "Misericórdia, tô derretendo!"',
                '💦 "Alguém me leva pra sombra!"',
                '🔥 "Tá de rachar! Bora um tereré gelado!"'
            ]
        };

        var estadoAtual = '';
        var tentativasFalhas = 0;

        // ============================================================
        // ===== ATUALIZA OS DADOS NA TELA ============================
        // ============================================================
        function updateWeather(data) {
            var temp = data.temp;
            var umi = data.umi;
            var uv = data.uv;
            var chuva = data.chuva;
            var bat = data.bat;

            document.getElementById('temp-value').textContent = temp || '--';
            document.getElementById('umid-value').textContent = umi || '--';
            document.getElementById('uv-value').textContent = uv || '--';
            document.getElementById('rain-value').textContent = chuva || '--';
            document.getElementById('battery-value').textContent = bat || '--';

            // Determina o estado do cacto
            var novoEstado = 'nublado';
            var t = parseFloat(temp) || 0;
            var u = parseFloat(umi) || 0;
            var uvVal = parseFloat(uv) || 0;
            var c = parseFloat(chuva) || 0;

            if (c > 70) novoEstado = 'chuvoso';
            else if (t > 33) novoEstado = 'quente';
            else if (t < 17) novoEstado = 'frio';
            else if (uvVal > 8) novoEstado = 'ensolarado';
            else if (u > 80) novoEstado = 'nublado';
            else novoEstado = 'ventoso';

            // Troca a imagem com animação
            if (novoEstado !== estadoAtual) {
                var img = document.getElementById('cacto-character');
                img.style.opacity = '0';
                img.style.transform = 'scale(0.85)';
                setTimeout(function() {
                    img.src = imagens[novoEstado];
                    img.style.opacity = '1';
                    img.style.transform = 'scale(1)';
                }, 250);
                estadoAtual = novoEstado;
                console.log('🌵 Cacto mudou para: ' + novoEstado);

                var nomes = {
                    ensolarado: '☀️ Ensolarado',
                    nublado: '☁️ Nublado',
                    chuvoso: '🌧️ Chuvoso',
                    ventoso: '🌬️ Ventoso',
                    frio: '🥶 Frio',
                    quente: '🥵 Quente'
                };
                document.getElementById('estadoBadge').textContent = nomes[novoEstado] || '☀️ Ensolarado';
            }

            // Atualiza frase do dia
            var listaFrases = frases[novoEstado] || frases.ensolarado;
            var fraseEscolhida = listaFrases[Math.floor(Math.random() * listaFrases.length)];
            var fraseLimpa = fraseEscolhida.replace(/^[^\s]+\s/, '').replace(/["']/g, '');
            document.getElementById('fraseDoDia').innerHTML = '🌵 <span class="destaque">Cacto diz:</span> "' + fraseLimpa + '"';
        }

        // ============================================================
        // ===== BUSCA DADOS DO ESP32 =================================
        // ============================================================
        function buscarDadosESP32() {
            var url = 'http://' + ipESP32 + '/dados';

            fetch(url, { timeout: 5000 })
                .then(function(resposta) {
                    if (!resposta.ok) {
                        throw new Error('HTTP ' + resposta.status);
                    }
                    return resposta.json();
                })
                .then(function(dados) {
                    document.getElementById('status-conexao').className = 'conectado';
                    document.getElementById('status-conexao').textContent = '✅ Conectado';
                    document.getElementById('ip-esp').textContent = ipESP32;
                    document.getElementById('ip-esp').style.color = '#94a3b8';
                    tentativasFalhas = 0;
                    updateWeather(dados);
                })
                .catch(function(erro) {
                    console.warn('⚠️ ESP32 offline:', erro.message);
                    tentativasFalhas++;

                    document.getElementById('status-conexao').className = 'desconectado';
                    document.getElementById('status-conexao').textContent = '⛔ Desconectado';

                    if (tentativasFalhas > 2) {
                        document.getElementById('ip-esp').textContent = ipESP32 + ' (offline)';
                        document.getElementById('ip-esp').style.color = '#f87171';
                    }

                    var fallback = {
                        temp: (18 + Math.random() * 18).toFixed(1),
                        umi: (30 + Math.random() * 60).toFixed(0),
                        uv: (Math.random() * 11).toFixed(1),
                        chuva: (Math.random() * 100).toFixed(0),
                        bat: (3.2 + Math.random() * 1.0).toFixed(2)
                    };
                    updateWeather(fallback);
                });
        }

        // ============================================================
        // ===== INICIALIZA ===========================================
        // ============================================================
        console.log('🌵 Cacto Gaúcho Mobile - Iniciando...');
        console.log('📡 IP do ESP32: ' + ipESP32);

        setInterval(buscarDadosESP32, 3000);
        buscarDadosESP32();
    </script>
</body>
</html>
